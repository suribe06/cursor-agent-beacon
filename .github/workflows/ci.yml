name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: astral-sh/ruff-action@v3
        with:
          src: "src tests"

      - uses: astral-sh/ruff-action@v3
        with:
          args: "format --check src tests"

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install package
        run: pip install -e ".[dev,bridge]"

      - name: Pyright
        run: pyright

  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package
        run: pip install -e ".[dev,bridge]"

      - name: Run tests with coverage
        run: pytest -m "not smoke" --cov=cursor_agent_beacon --cov-report=term-missing --cov-fail-under=75

  smoke:
    name: Smoke (setup.sh)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install package
        run: pip install -e ".[dev,bridge]"

      - name: Run setup smoke tests
        run: pytest -m smoke -v

  build:
    name: Build package
    runs-on: ubuntu-latest
    needs: [lint, typecheck, test, smoke]
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Build sdist and wheel
        run: |
          pip install build hatchling
          python -m build

      - name: Verify wheel installs
        run: |
          pip install dist/*.whl
          cursor-agent-beacon --help
          python -c "import cursor_agent_beacon; print('import ok')"
          python -c "from cursor_agent_beacon.paths import default_themes_dir; p=default_themes_dir(); assert (p/'standard'/'manifest.json').is_file(), p"

      - uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/
          retention-days: 7
