name: Bug report
description: Something is broken or not working as documented
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please include steps to reproduce and your environment.

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Clear description of the bug
      placeholder: The bridge returns 500 when...
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Run `cursor-agent-beacon bridge`
        2. Export `CURSOR_AGENT_BEACON_HTTP_URL=...`
        3. Run `python3 scripts/simulate_hook.py ...`
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Package version or git commit
      placeholder: v0.2.0 or abc1234
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: OS
      options:
        - Linux
        - macOS
        - Windows
        - Other
    validations:
      required: true

  - type: input
    id: python
    attributes:
      label: Python version
      placeholder: "3.12"
    validations:
      required: true

  - type: dropdown
    id: cursor
    attributes:
      label: Using Cursor hooks?
      options:
        - "Yes"
        - "No (CLI/simulation only)"
        - "Not sure"
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Hook output, bridge stderr, or test failures
      render: shell
