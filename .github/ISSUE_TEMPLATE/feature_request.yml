name: Feature request
description: Suggest an improvement or new capability
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Describe the problem you want solved and how it fits the project scope
        (deterministic Cursor agent status → display).

  - type: textarea
    id: problem
    attributes:
      label: Problem or use case
      placeholder: I want to see agent status on...
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      placeholder: Add a sink that...
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Optional — other approaches you thought about

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Hooks / status mapping
        - Bridge service
        - Themes / display
        - ESP32 firmware
        - Documentation
        - CI / tooling
        - Other
    validations:
      required: true
